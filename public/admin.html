<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindowsForums — Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0b0c10;
            --card: #15181f;
            --accent: #00e5ff;
            --text: #fff;
            --dim: #a0a5b1;
            --border: rgba(255, 255, 255, 0.06);
            --danger: #ff4d6d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            pointer-events: none
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.08), transparent 70%);
            top: -150px;
            left: -100px
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.05), transparent 70%);
            bottom: -100px;
            right: -100px
        }

        .logo-wrap {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: .75rem;
            margin-bottom: 2.5rem
        }

        .logo-wrap svg {
            width: 36px;
            height: 36px;
            color: var(--accent);
            filter: drop-shadow(0 0 8px rgba(0, 229, 255, .5))
        }

        .logo-wrap span {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px
        }

        .logo-wrap span em {
            color: var(--accent);
            font-style: normal
        }

        .card {
            position: relative;
            z-index: 10;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, .5)
        }

        .card-header {
            margin-bottom: 2rem;
            text-align: center
        }

        .card-header .icon {
            width: 56px;
            height: 56px;
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: var(--accent)
        }

        .card-header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: .3rem
        }

        .card-header p {
            font-size: .85rem;
            color: var(--dim)
        }

        .field {
            margin-bottom: 1.25rem
        }

        .field label {
            display: block;
            font-size: .72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--dim);
            margin-bottom: .5rem
        }

        .field .input-wrap {
            position: relative
        }

        .field input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .8rem 3rem .8rem 1rem;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s
        }

        .field input:focus {
            border-color: rgba(0, 229, 255, .4)
        }

        .field input::placeholder {
            color: rgba(255, 255, 255, .2)
        }

        .toggle-vis {
            position: absolute;
            right: .75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 4px;
            transition: color .2s
        }

        .toggle-vis:hover {
            color: var(--accent)
        }

        .btn {
            width: 100%;
            padding: .85rem;
            background: var(--accent);
            color: #000;
            font-weight: 800;
            font-size: .95rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
            margin-top: .5rem;
            position: relative
        }

        .btn:hover {
            opacity: .9
        }

        .btn:active {
            transform: scale(.98)
        }

        .btn.loading {
            opacity: .6;
            pointer-events: none
        }

        .err {
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid rgba(255, 77, 109, .3);
            border-radius: 8px;
            padding: .75rem 1rem;
            font-size: .82rem;
            color: var(--danger);
            margin-top: 1rem;
            display: none
        }

        .err.show {
            display: block
        }

        .footer-note {
            position: relative;
            z-index: 10;
            margin-top: 2rem;
            font-size: .72rem;
            color: rgba(255, 255, 255, .2);
            text-align: center
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="logo-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2L3 7v10l9 5 9-5V7l-9-5z" stroke-linejoin="round" />
            <path d="M12 22V12M12 12l9-5M12 12L3 7" stroke-linecap="round" />
        </svg>
        <span>Null<em>Defense</em></span>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" />
                    <path d="M7 11V7a5 5 0 0110 0v4" />
                </svg>
            </div>
            <h1>Root Access</h1>
            <p>Enter your account code to continue</p>
        </div>

        <div class="field">
            <label>Account Code</label>
            <div class="input-wrap">
                <input type="password" id="codeInput" placeholder="••••••••" autocomplete="off" />
                <button class="toggle-vis" onclick="toggleVis()" title="Show/hide code">
                    <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
        </div>

        <button class="btn" id="loginBtn" onclick="doLogin()">Access Dashboard</button>
        <div class="err" id="errBox">Invalid account code. Access denied.</div>
    </div>

    <p class="footer-note">NullDefense Admin Panel · Restricted Access</p>

    <script>
        function toggleVis() {
            const inp = document.getElementById('codeInput');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('codeInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        async function doLogin() {
            const code = document.getElementById('codeInput').value.trim();
            if (!code) return;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errBox');
            btn.classList.add('loading');
            btn.textContent = 'Verifying…';
            err.classList.remove('show');

            try {
                const res = await fetch(`/api/admin?code=${encodeURIComponent(code)}&action=login`);
                const data = await res.json();
                if (res.ok && data.ok) {
                    sessionStorage.setItem('nd_admin_code', code);
                    window.location.href = '/admin-dashboard.html';
                } else {
                    err.classList.add('show');
                    btn.textContent = 'Access Dashboard';
                    btn.classList.remove('loading');
                }
            } catch {
                err.classList.add('show');
                btn.textContent = 'Access Dashboard';
                btn.classList.remove('loading');
            }
        }
    </script>
</body>

</html>
