<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WindowsForum JS — Raw Text Paste Service</title>
  <meta name="description"
    content="WindowsForum JS — Create raw text pastes with clean URLs. Perfect for PowerShell irm | iex one-liners." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <!-- Animated background -->
  <div class="bg-noise"></div>
  <div class="bg-gradient-orb bg-gradient-orb--1"></div>
  <div class="bg-gradient-orb bg-gradient-orb--2"></div>
  <div class="bg-gradient-orb bg-gradient-orb--3"></div>
  <div class="bg-scanline"></div>
  <canvas id="particleCanvas" class="bg-particles"></canvas>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar__inner">
      <div class="navbar__brand">
        <div class="navbar__logo">
          <div class="navbar__logo-ring"></div>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L3 7v10l9 5 9-5V7l-9-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
            <path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </div>
        <span class="navbar__name">WindowsForum <span class="text-accent">JS</span></span>
      </div>
      <div class="navbar__status">
        <span class="status-dot"></span>
        <span class="navbar__status-text">System Online</span>
      </div>
      <div style="display:flex;align-items:center;gap:.6rem">
        <!-- Logged-out state -->
        <div id="authBtns" style="display:flex;gap:.5rem">
          <button onclick="openAuth('login')"
            style="background:none;border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:.35rem .8rem;color:#a0a5b1;font-size:.78rem;cursor:pointer;font-family:inherit;transition:all .2s"
            onmouseover="this.style.borderColor='rgba(0,229,255,.4)';this.style.color='#00e5ff'"
            onmouseout="this.style.borderColor='rgba(255,255,255,.12)';this.style.color='#a0a5b1'">Login</button>
          <button onclick="openAuth('signup')"
            style="background:#00e5ff;border:none;border-radius:8px;padding:.35rem .9rem;color:#000;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s"
            onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">Sign Up</button>
        </div>
        <!-- Logged-in state -->
        <div id="userBtns" style="display:none;align-items:center;gap:.5rem">
          <span id="navUser" style="font-size:.78rem;color:#00e5ff;font-weight:600"></span>
          <button onclick="doLogout()"
            style="background:none;border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:.35rem .7rem;color:#a0a5b1;font-size:.75rem;cursor:pointer;font-family:inherit">Logout</button>
        </div>
        <a href="https://discord.gg/gkSVRQjngv" target="_blank"
          style="display:flex;align-items:center;justify-content:center;background:rgba(88,101,242,.08);border:1px solid rgba(88,101,242,.25);border-radius:8px;padding:.35rem;color:#5865f2;transition:all .2s"
          onmouseover="this.style.background='rgba(88,101,242,.15)';this.style.borderColor='rgba(88,101,242,0.4)'"
          onmouseout="this.style.background='rgba(88,101,242,.08)';this.style.borderColor='rgba(88,101,242,.25)'"
          title="Join Discord">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-0.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.086 2.157 2.419c0 1.334-.947 2.419-2.157 2.419zm7.974 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.086 2.157 2.419c0 1.334-.946 2.419-2.157 2.419z" />
          </svg>
        </a>
        <a href="/admin.html"
          style="background:rgba(255,165,0,.08);border:1px solid rgba(255,165,0,.25);border-radius:8px;padding:.35rem .8rem;color:#ffa500;font-size:.75rem;font-weight:600;text-decoration:none">⬡
          Admin</a>
      </div>
    </div>
  </nav>

  <!-- ── AUTH MODAL ───────────────────────────────────── -->
  <div id="authOverlay"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center;padding:20px">
    <div
      style="background:#15181f;border:1px solid rgba(255,255,255,.07);border-radius:20px;width:100%;max-width:400px;padding:2rem;position:relative;box-shadow:0 40px 80px rgba(0,0,0,.6)">
      <button onclick="closeAuth()"
        style="position:absolute;right:1rem;top:1rem;background:none;border:none;color:#a0a5b1;font-size:1.2rem;cursor:pointer">✕</button>
      <!-- Tabs -->
      <div
        style="display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:10px;padding:4px;margin-bottom:1.5rem">
        <button id="tabLogin" onclick="switchTab('login')"
          style="flex:1;padding:.5rem;border:none;border-radius:7px;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;background:#00e5ff;color:#000;transition:all .2s">Login</button>
        <button id="tabSignup" onclick="switchTab('signup')"
          style="flex:1;padding:.5rem;border:none;border-radius:7px;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;background:none;color:#a0a5b1;transition:all .2s">Sign
          Up</button>
      </div>
      <div id="authUsername" style="margin-bottom:.9rem">
        <label
          style="display:block;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#a0a5b1;margin-bottom:.4rem">Username</label>
        <input id="authUser" type="text" placeholder="your_username"
          style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.75rem 1rem;color:#fff;font-size:.9rem;outline:none;font-family:inherit" />
      </div>
      <div style="margin-bottom:.9rem">
        <label
          style="display:block;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#a0a5b1;margin-bottom:.4rem">Password</label>
        <input id="authPass" type="password" placeholder="••••••••"
          style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.75rem 1rem;color:#fff;font-size:.9rem;outline:none;font-family:inherit" />
      </div>
      <div id="authErr"
        style="background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:8px;padding:.6rem 1rem;font-size:.8rem;color:#ff4d6d;margin-bottom:.8rem;display:none">
      </div>
      <button id="authSubmitBtn" onclick="submitAuth()"
        style="width:100%;padding:.8rem;background:#00e5ff;color:#000;font-weight:800;font-size:.9rem;border:none;border-radius:10px;cursor:pointer;font-family:inherit">Login</button>
    </div>
  </div>

  <!-- Hero -->
  <header class="hero">
    <div class="hero__badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
      </svg>
      Instant Raw Links
    </div>
    <h1 class="hero__title">
      <span class="hero__title-line">Raw Text.</span>
      <span class="hero__title-line hero__title-line--accent">Zero Friction.</span>
    </h1>
    <p class="hero__subtitle">
      Create pastes, get clean raw URLs. Built for <code>irm | iex</code> workflows.
    </p>
  </header>

  <!-- Main Content -->
  <main class="main">
    <!-- Editor Section -->
    <section class="editor-section" id="editorSection">
      <div class="editor-card">
        <div class="editor-card__glow"></div>
        <div class="editor-card__toolbar">
          <div class="toolbar__dots">
            <span class="dot dot--red"></span>
            <span class="dot dot--yellow"></span>
            <span class="dot dot--green"></span>
          </div>
          <div class="toolbar__center">
            <svg class="toolbar__icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z" />
              <polyline points="13 2 13 9 20 9" />
            </svg>
            <span class="toolbar__filename">untitled.ps1</span>
          </div>
          <div class="toolbar__actions">
            <button class="toolbar__btn" id="clearBtn" title="Clear editor">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
              </svg>
            </button>
          </div>
        </div>

        <div class="editor-card__body">
          <div class="line-numbers" id="lineNumbers">
            <span>1</span>
          </div>
          <textarea class="editor-card__textarea" id="codeEditor" placeholder="# Paste your script here..."
            spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
        </div>

        <div class="editor-card__footer">
          <div class="footer__left">
            <span class="footer__stat" id="charCount">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 7V4h16v3M9 20h6M12 4v16" />
              </svg>
              0 chars
            </span>
            <span class="footer__stat" id="lineCount">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10H3M21 6H3M21 14H3M21 18H3" />
              </svg>
              0 lines
            </span>
          </div>
          <button class="btn btn--primary" id="createBtn">
            <span class="btn__text">Create Paste</span>
            <svg class="btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round">
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
            <div class="btn__loader"></div>
          </button>
        </div>
      </div>
    </section>

    <!-- Result Section -->
    <section class="result-section hidden" id="resultSection">
      <div class="result-card">
        <div class="result-card__glow"></div>

        <div class="result-card__header">
          <div class="result-card__check">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
          <div>
            <h2 class="result-card__title">Paste Created</h2>
            <p class="result-card__subtitle">Your raw link is ready to use</p>
          </div>
        </div>

        <!-- Raw URL -->
        <div class="result-field">
          <label class="result-field__label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
              <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
            </svg>
            Raw URL <span class="label-badge">Protected</span>
          </label>
          <div class="result-field__row">
            <input type="text" class="result-field__input" id="rawUrlInput" readonly />
            <button class="btn btn--copy" id="copyRawBtn" data-copy="rawUrlInput">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <rect x="9" y="9" width="13" height="13" rx="2" />
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
              </svg>
              <span>Copy</span>
            </button>
          </div>
        </div>

        <!-- PowerShell One-liner -->
        <div class="result-field">
          <label class="result-field__label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="4 17 10 11 4 5" />
              <line x1="12" y1="19" x2="20" y2="19" />
            </svg>
            PowerShell One-Liner
          </label>
          <div class="result-field__row">
            <input type="text" class="result-field__input result-field__input--mono" id="psOnelinerInput" readonly />
            <button class="btn btn--copy" id="copyPsBtn" data-copy="psOnelinerInput">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <rect x="9" y="9" width="13" height="13" rx="2" />
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
              </svg>
              <span>Copy</span>
            </button>
          </div>
        </div>

        <div class="result-card__divider"></div>

        <button class="btn btn--new" id="newPasteBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
          New Paste
        </button>
      </div>
    </section>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast">
    <div class="toast__icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>
    <span class="toast__text" id="toastText"></span>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__text">&copy; 2026 WindowsForum JS</span>
      <span class="footer__sep">&bull;</span>
      <span class="footer__text">Main Developer / Scripter <a href="#"
          style="color:var(--accent);text-decoration:none">@ZN84</a> / MODY</span>
    </div>
  </footer>

  <script src="./js/app.js"></script>
</body>

</html>
